<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dreamscape - Pure Keyword UI</title>
<style>
/* 基礎設定 */
body { margin:0; height:200vh; background:black; font-family: "Felix Titling", serif, "Helvetica Neue", Arial; }
body.locked { overflow:hidden; }
canvas { position:fixed; left:0; top:0; z-index: 1; }

/* --- 頂部導航 --- */
.top-nav {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 80px; 
  z-index: 100; display: flex; justify-content: center; align-items: center;
}
.nav-container {
  width: 50%; display: grid; grid-template-columns: repeat(5, 1fr);
  justify-items: center; align-items: center;
}
.nav-item {
  color: white; text-decoration: none; font-size: 13px; font-weight: 300;
  letter-spacing: 1px; cursor: pointer; transition: opacity 0.3s;
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
}
.logo-img { height: 30px; width: auto; display: block; }

/* --- 左下角引導文字 --- */
.bottom-left-text {
  position: fixed;
  bottom: 45px;
  left: 45px;
  color: white;
  font-family: "Gill Sans Light", "Gill Sans", sans-serif;
  font-size: 13px; 
  letter-spacing: 0.12em;
  opacity: 0.7; 
  z-index: 90;
  pointer-events: none;
  transition: opacity 0.5s ease;
  line-height: 2.1;
}

/* --- 展開後的文字內容層 --- */
#expanded-overlay {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  display: flex; justify-content: center; align-items: center;
  z-index: 50; 
  opacity: 0; pointer-events: none;
  transition: opacity 0.8s ease;
}

.content-scroll-box {
  max-width: 650px;
  padding: 40px;
  text-align: center;
  color: white;
  max-height: 75vh;
  overflow-y: auto;
  scrollbar-width: none;
}
.content-scroll-box::-webkit-scrollbar { display: none; }

.dream-title {
  font-family: "Felix Titling", serif;
  font-size: 28px;
  letter-spacing: 8px;
  margin-bottom: 35px; /* 增加與內文的間距 */
  text-transform: uppercase;
  color: #ffffff;
}

.dream-body {
  font-family: "Gill Sans Light", "Gill Sans", sans-serif;
  font-size: 15px;
  line-height: 2.1;
  letter-spacing: 0.05em;
  opacity: 0.85;
  margin-bottom: 65px;
}

/* --- 螢幕下方關閉引導 --- */
.center-guide {
  position: fixed;
  bottom: 80px; 
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  z-index: 110;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.6s ease;
}
.center-guide-text {
  color: rgba(255, 255, 255, 0.7);
  font-family: "Gill Sans Light", "Gill Sans", sans-serif;
  font-size: 13px; 
  letter-spacing: 0.12em;
  text-align: center;
  margin-bottom: 12px;
}
.center-guide-dot {
  width: 4px; height: 4px; background-color: white; border-radius: 50%;
}

/* 狀態控制 */
.visible { opacity: 1 !important; pointer-events: auto !important; }
.hidden { opacity: 0 !important; }
</style>
</head>
<body>

<nav class="top-nav">
  <div class="nav-container">
    <a class="nav-item">AI visualize</a>
    <a class="nav-item">Dream World</a>
    <a class="nav-item logo"><img src="Group 2.png" alt="Logo" class="logo-img"></a>
    <a class="nav-item">my dream</a>
    <a class="nav-item">+</a>
  </div>
</nav>

<div class="bottom-left-text">
  Scroll to drift through the subconscious<br>
  Tap a dream to unfold its story and insight
</div>

<div id="expanded-overlay">
  <div class="content-scroll-box" id="dream-content"></div>
</div>

<div class="center-guide">
  <div class="center-guide-text">Tap anywhere to close</div>
  <div class="center-guide-dot"></div>
</div>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const bottomTextElem = document.querySelector('.bottom-left-text');
const centerGuideElem = document.querySelector('.center-guide');
const expandedOverlay = document.getElementById('expanded-overlay');
const dreamContent = document.getElementById('dream-content');

let expanding = { active:false, x:0, y:0, r:0, maxR:0, color:"", progress:0 };
let glowVals=[0,0,0,0,0,0]; 
let ballPos = Array.from({length:6},()=>({x:0,y:0}));
let positions = [];
let ballSizes = []; 

const dreamData = [
  {
    keyword: "CONFRONTATION",
    narrative: "I am standing on a floor of breaking glass. A massive, silent shadow chases me, but when I turn to scream, no sound comes out. The air thickens like water, and the world turns to dust.",
    why: "This stems from repressed aggression or a loss of control in your waking life. Your brain simulates a 'fight-or-flight' scenario to process unresolved frustrations, manifesting as physical obstacles or the inability to speak."
  },
  {
    keyword: "NOSTALGIA",
    narrative: "Sitting on my grandmother's kitchen floor in the autumn sunlight. The room smells of cinnamon and tea. I hear familiar whispers from the next room—a perfect, golden stillness.",
    why: "This reflects a psychological need for security. When facing stress or loneliness, the subconscious retrieves 'safe' sensory memories to repair emotional resilience and provide a sense of belonging."
  },
  {
    keyword: "FLOAT",
    narrative: "Running through a field of impossible flowers, then suddenly floating. Gravity vanishes. I see friends waving below and feel a burst of laughter that makes the air sparkle.",
    why: "Triggered by dopamine surges, these dreams occur when you experience a breakthrough or a release from burden. The sensation of flying symbolizes a peak emotional state and the subconscious desire for total freedom."
  },
  {
    keyword: "LEAF",
    narrative: "I am a single leaf drifting down a wide, clear river. The forest is lush and silent. I don't need to do anything but move with the water. The world feels like it is finally exhaling.",
    why: "This is a restorative mechanism. When the brain is overwhelmed by information, it creates a low-conflict environment to allow the nervous system to 'reset' and recover from mental exhaustion."
  },
  {
    keyword: "ASYMMETRY",
    narrative: "A train where passengers are giant clocks with eyes. The scenery outside changes from deserts to logic puzzles. Letters in my book turn into insects and fly away. I have no ticket, only a handful of forgotten names.",
    why: "Caused by random neural firing while the brain’s logical center (prefrontal cortex) is asleep. It reflects the mind’s attempt to reorganize fragmented, unrelated data into a narrative, resulting in surreal cognitive dissonance."
  },
  {
    keyword: "ISOLATION",
    narrative: "Standing in an empty city under a perpetual twilight. Every door is locked. When I look in a mirror, my reflection is just static. A cold fog rises, absorbing all the light.",
    why: "Often linked to low serotonin or social disconnection. The locked doors and blurred reflections represent a 'dissociative state,' where the mind struggles to find its place or value in the real world."
  }
];

const ballColors = [
  { dark:"#680000", glow:"#af0a29" },
  { dark:"#733d0d", glow:"#9b5c12" },
  { dark:"#5d4f0d", glow:"#a6880f" },
  { dark:"#005c1a", glow:"#527f43" },
  { dark:"#2b003e", glow:"#540b7a" },
  { dark:"#1445D2", glow:"#4efcff" }
];

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.onresize = ()=>{
  resize(); initOrbs(); initParticles(); initPositions(); initBallSizes();
};
resize();

function drawBall(x1,x2,y,colors,glow,t,edge=0, sizeFactor=1, keyword=""){ 
  const r = 170 * sizeFactor;
  let alpha = (1 - Math.abs(t-0.5)*2) * (1 - 0.5 * edge);
  let darkBlur = (35 * sizeFactor + 25*(1-alpha) + edge*70);
  let glowBlur = (45 * sizeFactor + 30*(1-alpha) + edge*70);
  const dx = x2 - x1;
  const merged = Math.max(0, 1 - dx/(2*r)); 

  ctx.filter=`blur(${darkBlur}px)`;
  ctx.globalAlpha = alpha * 0.85; 
  ctx.fillStyle=colors.dark;
  ctx.beginPath();
  if(merged>0.94) ctx.arc((x1+x2)/2,y,r,0,Math.PI*2);
  else { ctx.arc(x1,y,r,0,Math.PI*2); ctx.arc(x2,y,r,0,Math.PI*2); }
  ctx.fill();

  glow += (merged>0 ? 0.04 : -0.04);
  glow = Math.max(0,Math.min(1,glow));
  if(glow>0){
    ctx.globalCompositeOperation="lighter";
    ctx.filter=`blur(${glowBlur}px)`;
    ctx.globalAlpha = alpha * 0.75; 
    ctx.fillStyle=colors.glow;
    ctx.beginPath();
    ctx.arc((x1+x2)/2,y,r*(0.5 + 0.3*merged)*glow,0,Math.PI*2); 
    ctx.fill();
    ctx.globalCompositeOperation="source-over";
  }

  ctx.save();
  ctx.filter = `blur(${edge * 25}px)`;
  ctx.globalAlpha = alpha; 
  ctx.fillStyle = "white";
  const fontSize = keyword.length > 10 ? 16 : 20;
  ctx.font = `300 ${fontSize * sizeFactor}px "Felix Titling", serif`;
  ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.letterSpacing = "6px";
  ctx.fillText(keyword, (x1+x2)/2, y);
  ctx.restore();

  ctx.filter="none"; ctx.globalAlpha=1;
  return glow;
}

const orbs = [];
function initOrbs(){ orbs.length=0; for(let i=0;i<5;i++){ orbs.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, baseR:180+Math.random()*250, r:100, driftX:(Math.random()-0.5)*0.3, driftY:(Math.random()-0.5)*0.3, pulse:Math.random()*Math.PI*2}); } }
initOrbs();
function drawOrbs(){ ctx.globalCompositeOperation="screen"; orbs.forEach(o=>{ o.pulse+=0.008; o.r = o.baseR + Math.sin(o.pulse)*60; o.x+=o.driftX; o.y+=o.driftY; ctx.filter="blur(150px)"; ctx.globalAlpha=0.35; ctx.fillStyle="#2d0066"; ctx.beginPath(); ctx.arc(o.x,o.y,o.r,0,Math.PI*2); ctx.fill(); }); ctx.filter="none"; ctx.globalAlpha=1; ctx.globalCompositeOperation="source-over"; }
const particles=[];
function initParticles(){ particles.length=0; for(let i=0;i<80;i++){ particles.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, r:2+Math.random()*0.5, dx:(Math.random()-0.5)*0.4, dy:(Math.random()-0.5)*0.4, color:`rgba(255,255,255,0.8)`}); } }
initParticles();
function drawParticles(){ ctx.globalCompositeOperation="lighter"; particles.forEach(p=>{ p.x+=p.dx; p.y+=p.dy; if(p.x<0)p.x=canvas.width; if(p.x>canvas.width)p.x=0; if(p.y<0)p.y=canvas.height; if(p.y>canvas.height)p.y=0; ctx.globalAlpha=0.5; ctx.filter="blur(3px)"; ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill(); }); ctx.filter="none"; ctx.globalAlpha=1; ctx.globalCompositeOperation="source-over"; }
function getScrollProgress(){ const max = document.body.scrollHeight - window.innerHeight; return Math.min(1, Math.max(0, window.scrollY/max)); }
function initPositions(){ const w = canvas.width; positions = []; for(let i=0;i<6;i++){ let px, safe=false, attempts=0; while(!safe && attempts<200){ px = (Math.random()*0.7 + 0.15) * w; safe = positions.every(v => Math.abs(v - px) >= 200); attempts++; } positions.push(px); } for(let i=0;i<6;i++){ ballPos[i].x = positions[i]; ballPos[i].y = -200; } }
initPositions();
function initBallSizes(){ ballSizes.length = 0; for (let i = 0; i < 6; i++) ballSizes.push(0.8 + Math.random() * 0.5); }
initBallSizes(); 

function drawBottomArcs(beat) {
  const w = canvas.width, h = canvas.height;
  ctx.filter = "blur(70px)"; 
  const arcH = h * 0.45; const bottom = h + arcH * 0.6 - (beat * 18); const scale = 1 + beat * 0.08; const flatFactor = 0.9;
  ctx.globalAlpha = 0.7; ctx.fillStyle = "#c90041"; ctx.beginPath(); ctx.ellipse(w/2, bottom - arcH * 0.3, w * 0.95 * scale, arcH * 0.75 * scale * flatFactor, 0, Math.PI, 0); ctx.fill();
  ctx.globalAlpha = 0.8; ctx.fillStyle = "#e5004f"; ctx.beginPath(); ctx.ellipse(w/2, bottom - arcH * 0.18, w * 0.92 * scale, arcH * 0.65 * scale * flatFactor, 0, Math.PI, 0); ctx.fill();
  ctx.globalAlpha = 0.9; ctx.fillStyle = "#ffffff"; ctx.beginPath(); ctx.ellipse(w/2, bottom, w * 0.95 * scale, arcH * 0.8 * scale * flatFactor, 0, Math.PI, 0); ctx.fill();
  ctx.filter = "none";
}

// ====================== 點擊與內容更新 ======================
[canvas, expandedOverlay].forEach(el => {
  el.addEventListener("click", e => {
    if(expanding.active){
      expanding.active=false; document.body.classList.remove("locked");
      bottomTextElem.classList.remove('hidden'); centerGuideElem.classList.remove('visible');
      expandedOverlay.classList.remove('visible'); return;
    }
    if(el === canvas){
      const mx=e.offsetX, my=e.offsetY;
      for(let i=0;i<6;i++){
        if(Math.hypot(mx-ballPos[i].x,my-ballPos[i].y)<150){ 
          const data = dreamData[i];
          // 移除副標題後的內容結構
          dreamContent.innerHTML = `
            <div class="dream-title">${data.keyword}</div>
            <div class="dream-body">${data.narrative}</div>
            <div class="dream-title" style="font-size:20px;">Why have this dream</div>
            <div class="dream-body">${data.why}</div>
          `;
          expanding.active=true; expanding.x=canvas.width/2; expanding.y=canvas.height/2;
          expanding.maxR=Math.min(canvas.width,canvas.height)*0.45; expanding.color=ballColors[i].dark; expanding.progress=0; 
          document.body.classList.add("locked"); bottomTextElem.classList.add('hidden');
          centerGuideElem.classList.add('visible'); expandedOverlay.classList.add('visible');
          break;
        }
      }
    }
  });
});

function drawExpandedBg(){ if(!expanding.active) return; expanding.progress = Math.min(1, expanding.progress + 0.04); const radius = 50 + (expanding.maxR-50)*expanding.progress; ctx.save(); ctx.globalCompositeOperation="lighter"; ctx.globalAlpha=expanding.progress * 0.8; ctx.filter="blur(120px)"; ctx.fillStyle=expanding.color; ctx.beginPath(); ctx.arc(expanding.x,expanding.y,radius,0,Math.PI*2); ctx.fill(); ctx.restore(); }

function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height); drawOrbs(); drawParticles();
  const w = canvas.width, h = canvas.height, scroll = getScrollProgress();
  let time = Date.now(), cycle = time % 2500, beat = 0;
  if (cycle < 700) { let t = cycle / 700; let p1 = Math.pow(Math.sin(t * Math.PI), 4); let p2 = 0; if (t > 0.3) p2 = Math.pow(Math.sin((t - 0.3) * Math.PI), 6) * 0.5; beat = Math.max(p1, p2); }
  if(!expanding.active){
    for(let i=0;i<6;i++){
      const start = i * 0.14, end = start + 0.30;
      let t = Math.max(0, Math.min(1, (scroll - start) / (end - start)));
      const y = -200 + t * (h + 650);
      ballPos[i].y = y;
      const blurThreshold = 0.35; 
      let edge = (y < h * blurThreshold) ? (1 - (y / (h * blurThreshold))) : (y > h * (1 - blurThreshold) ? (y - h * (1 - blurThreshold)) / (h * blurThreshold) : 0);
      let s = (t < 0.33) ? (0.4 - (t/0.33)*0.37) : (t < 0.66 ? 0.03 : (0.03 + ((t-0.66)/0.34)*0.37));
      s += edge * 0.40;
      const cx = positions[i];
      glowVals[i] = drawBall(cx - s*(w*0.45), cx + s*(w*0.45), y, ballColors[i], glowVals[i], t, edge, ballSizes[i], dreamData[i].keyword);
    }
  }
  drawBottomArcs(beat); drawExpandedBg(); requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
